jobs:
  pypi-publish:
    name: Publicar no PyPI
    runs-on: ubuntu-latest
    # ESSA PERMISSÃO É OBRIGATÓRIA PARA PUBLICADORES CONFIÁVEIS
    permissions:
      id-token: write  

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Instalar build e gerar distribuição
        run: |
          python -m pip install build --user
          python -m build

      - name: Enviar para o PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Não precisa definir nenhuma senha ou token aqui! 
        # O PyPI vai reconhecer o repositório automaticamente.